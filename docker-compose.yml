version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book-recommender-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the vector DB
      - ./backend/chroma_db:/app/chroma_db
    env_file:
      - .env
    environment:
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - book-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: book-recommender-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - book-network

networks:
  book-network:
    driver: bridge
